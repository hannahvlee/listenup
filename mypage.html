<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>마이페이지 - ListenUp!</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --bg: #0e0e0e; --surface: #1a1a1a; --surface2: #242424; --border: #2e2e2e;
    --accent: #c8f060; --accent2: #60c8f0; --text: #f0ede8; --text-muted: #6e6e6e;
    --text-dim: #3e3e3e; --danger: #f06060; --success: #60f0a0; --warn: #f0c060;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; display: flex; flex-direction: column; }
  body::before { content: ''; position: fixed; inset: 0; background: radial-gradient(ellipse 80% 50% at 20% 20%, rgba(200,240,96,0.04) 0%, transparent 60%), radial-gradient(ellipse 60% 40% at 80% 80%, rgba(96,200,240,0.04) 0%, transparent 60%); pointer-events: none; z-index: 0; }
  .container { max-width: 800px; margin: 0 auto; padding: 48px 24px 80px; position: relative; z-index: 1; flex: 1; }
  .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; padding-bottom: 16px; border-bottom: 1px solid var(--border); }
  .logo { font-family: 'DM Mono', monospace; font-size: 15px; color: var(--accent2); text-decoration: none; letter-spacing: 0.18em; font-weight: 700; }
  .label { font-family: 'DM Mono', monospace; font-size: 11px; letter-spacing: 0.15em; color: var(--accent); text-transform: uppercase; margin-bottom: 10px; }
  .stat-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 32px; }
  .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 18px 20px; }
  .stat-label { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--text-muted); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 8px; }
  .stat-value { font-size: 26px; font-weight: 600; line-height: 1; }
  .stat-unit { font-size: 11px; color: var(--text-muted); margin-top: 4px; }
  .info-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 18px 20px; margin-bottom: 10px; }
  .info-label { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--text-muted); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 6px; }
  .info-value { font-size: 14px; color: var(--text); }
  .section-label { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--text-muted); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 12px; }
  .record-item { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 14px 18px; display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
  .record-title { font-size: 14px; color: var(--text); margin-bottom: 3px; }
  .record-meta { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--text-muted); }
  .btn-logout { width: 100%; padding: 13px; background: transparent; border: 1px solid var(--border); border-radius: 10px; color: var(--danger); font-family: 'DM Mono', monospace; font-size: 13px; letter-spacing: 0.05em; cursor: pointer; transition: all 0.15s; margin-top: 32px; }
  .btn-logout:hover { border-color: var(--danger); background: rgba(240,96,96,0.06); }
  ::-webkit-scrollbar { width: 6px; } ::-webkit-scrollbar-track { background: transparent; } ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <a href="index.html" class="logo">🎧 ListenUp!</a>
    <a href="index.html" style="font-family:'DM Mono',monospace;font-size:12px;color:var(--text-muted);text-decoration:none;letter-spacing:0.05em;">← 홈</a>
  </div>

  <div class="label">My Account</div>
  <h1 id="userName" style="font-size:28px;font-weight:600;margin-bottom:32px;">...</h1>

  <div class="stat-grid">
    <div class="stat-card">
      <div class="stat-label">총 학습</div>
      <div class="stat-value" id="totalCount" style="color:var(--accent);">-</div>
      <div class="stat-unit">회</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">평균 점수</div>
      <div class="stat-value" id="avgScore" style="color:var(--accent2);">-</div>
      <div class="stat-unit">점</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">최고 점수</div>
      <div class="stat-value" id="bestScore" style="color:var(--success);">-</div>
      <div class="stat-unit">점</div>
    </div>
  </div>

  <div class="info-card" style="margin-bottom:32px;">
    <div class="info-label">이메일</div>
    <div class="info-value" id="userEmail">...</div>
  </div>

  <div class="section-label">최근 학습</div>
  <div id="recentRecords">
    <div style="font-family:'DM Mono',monospace;font-size:12px;color:var(--text-muted);padding:20px 0;">불러오는 중...</div>
  </div>

  <button class="btn-logout" onclick="logout()">로그아웃</button>
</div>

<footer style="border-top:1px solid var(--border);padding:20px 24px;text-align:center;position:relative;z-index:1;">
  <span style="font-family:'DM Mono',monospace;font-size:11px;color:var(--text-muted);letter-spacing:0.08em;">© 2026 ListenUp. All Rights Reserved.</span>
</footer>

<script>
  const _supabase = supabase.createClient(
    'https://wccuzwkswtaehcdijtcf.supabase.co',
    'sb_publishable_eZS7VnthlclvotZvFA5C_w_ek_tSJ-y'
  );

  async function init() {
    const { data: { session } } = await _supabase.auth.getSession();
    if (!session) { window.location.href = 'login.html'; return; }

    const user = session.user;
    const name = user?.user_metadata?.full_name || user?.email || '사용자';
    document.getElementById('userName').textContent = name;
    document.getElementById('userEmail').textContent = user.email;

    // 기록 불러오기
    try {
      const res = await fetch('/api/records?email=' + encodeURIComponent(user.email));
      const { records } = await res.json();

      if (!records || records.length === 0) {
        document.getElementById('recentRecords').innerHTML = '<div style="font-family:\'DM Mono\',monospace;font-size:12px;color:var(--text-muted);padding:20px 0;">아직 학습 기록이 없어요</div>';
        document.getElementById('totalCount').textContent = '0';
        document.getElementById('avgScore').textContent = '-';
        document.getElementById('bestScore').textContent = '-';
        return;
      }

      // 통계
      document.getElementById('totalCount').textContent = records.length;
      const scores = records.filter(r => r.score != null).map(r => r.score);
      if (scores.length) {
        document.getElementById('avgScore').textContent = Math.round(scores.reduce((a,b)=>a+b,0)/scores.length);
        document.getElementById('bestScore').textContent = Math.max(...scores);
      }

      // 최근 5개
      const recent = records.slice(0, 5);
      document.getElementById('recentRecords').innerHTML = recent.map(r => {
        const date = new Date(r.date);
        const dateStr = (date.getMonth()+1) + '월 ' + date.getDate() + '일';
        const scoreColor = r.score >= 80 ? 'var(--success)' : r.score >= 60 ? 'var(--warn)' : 'var(--danger)';
        return `<div class="record-item">
          <div>
            <div class="record-title">${r.track}</div>
            <div class="record-meta">${r.mode} · ${dateStr}</div>
          </div>
          ${r.score != null ? `<div style="font-family:'DM Mono',monospace;font-size:14px;font-weight:600;color:${scoreColor};">${r.score}점</div>` : ''}
        </div>`;
      }).join('');
    } catch(e) {
      document.getElementById('recentRecords').innerHTML = '<div style="font-family:\'DM Mono\',monospace;font-size:12px;color:var(--text-muted);padding:20px 0;">기록을 불러올 수 없어요</div>';
    }
  }

  async function logout() {
    await _supabase.auth.signOut();
    window.location.href = 'login.html';
  }

  init();
</script>
</body>
</html>
