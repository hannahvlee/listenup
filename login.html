<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>로그인 - ListenUp!</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --bg: #0e0e0e; --surface: #1a1a1a; --surface2: #242424; --border: #2e2e2e;
    --accent: #c8f060; --accent2: #60c8f0; --text: #f0ede8; --text-muted: #6e6e6e;
    --text-dim: #3e3e3e; --danger: #f06060; --success: #60f0a0;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg); color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    display: flex; flex-direction: column;
  }
  body::before {
    content: '';
    position: fixed; inset: 0;
    background:
      radial-gradient(ellipse 80% 50% at 20% 20%, rgba(200,240,96,0.04) 0%, transparent 60%),
      radial-gradient(ellipse 60% 40% at 80% 80%, rgba(96,200,240,0.04) 0%, transparent 60%);
    pointer-events: none; z-index: 0;
  }
  .container {
    max-width: 420px; margin: 0 auto;
    padding: 48px 24px 80px;
    position: relative; z-index: 1;
    flex: 1; display: flex; flex-direction: column; justify-content: center;
  }
  .logo {
    font-family: 'DM Mono', monospace;
    font-size: 15px; color: var(--accent2);
    text-decoration: none; letter-spacing: 0.18em; font-weight: 700;
    display: block; margin-bottom: 48px;
  }
  .label {
    font-family: 'DM Mono', monospace;
    font-size: 11px; letter-spacing: 0.15em;
    color: var(--accent); text-transform: uppercase; margin-bottom: 10px;
  }
  h1 {
    font-weight: 600; font-size: clamp(28px, 6vw, 38px);
    line-height: 1.1; margin-bottom: 8px;
  }
  .subtitle { font-size: 14px; color: var(--text-muted); margin-bottom: 40px; }

  .btn-google {
    width: 100%;
    box-sizing: border-box;
    display: flex; align-items: center; justify-content: center; gap: 12px;
    padding: 16px 20px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 15px; font-weight: 500;
    cursor: pointer;
    transition: all 0.15s;
    text-decoration: none;
  }
  .btn-google:hover {
    border-color: var(--accent2);
    background: rgba(96,200,240,0.06);
    color: var(--accent2);
  }
  .btn-google svg { flex-shrink: 0; }

  .error-msg {
    background: rgba(240,96,96,0.08);
    border: 1px solid rgba(240,96,96,0.2);
    border-radius: 8px;
    padding: 12px 14px;
    font-size: 13px; color: var(--danger);
    margin-bottom: 16px; display: none;
  }
  .error-msg.show { display: block; }

  .loading {
    display: none; text-align: center;
    font-family: 'DM Mono', monospace;
    font-size: 12px; color: var(--text-muted);
    margin-top: 16px;
  }
  .loading.show { display: block; }

  footer {
    border-top: 1px solid var(--border);
    padding: 20px 24px; text-align: center;
    position: relative; z-index: 1;
  }
  footer a {
    font-family: 'DM Mono', monospace;
    font-size: 11px; color: var(--text-muted);
    text-decoration: none; letter-spacing: 0.08em;
  }
  footer span { color: var(--border); margin: 0 8px; }
</style>
</head>
<body>
<div class="container">
  <a href="index.html" class="logo">🎧 ListenUp!</a>

  <div class="label">Welcome</div>
  <h1>로그인</h1>
  <p class="subtitle">학습 기록을 저장하고 진도를 관리하세요</p>

  <div class="error-msg" id="errorMsg"></div>

    <button class="btn-google" onclick="loginWithGoogle()">
      <svg width="18" height="18" viewBox="0 0 18 18" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M17.64 9.20455C17.64 8.56636 17.5827 7.95273 17.4764 7.36364H9V10.845H13.8436C13.635 11.97 13.0009 12.9232 12.0477 13.5614V15.8195H14.9564C16.6582 14.2527 17.64 11.9455 17.64 9.20455Z" fill="#4285F4"/>
        <path d="M9 18C11.43 18 13.4673 17.1941 14.9564 15.8195L12.0477 13.5614C11.2418 14.1014 10.2109 14.4204 9 14.4204C6.65591 14.4204 4.67182 12.8373 3.96409 10.71H0.957275V13.0418C2.43818 15.9832 5.48182 18 9 18Z" fill="#34A853"/>
        <path d="M3.96409 10.71C3.78409 10.17 3.68182 9.59318 3.68182 9C3.68182 8.40682 3.78409 7.83 3.96409 7.29V4.95818H0.957275C0.347727 6.17318 0 7.54773 0 9C0 10.4523 0.347727 11.8268 0.957275 13.0418L3.96409 10.71Z" fill="#FBBC05"/>
        <path d="M9 3.57955C10.3214 3.57955 11.5077 4.03364 12.4405 4.92545L15.0218 2.34409C13.4632 0.891818 11.4259 0 9 0C5.48182 0 2.43818 2.01682 0.957275 4.95818L3.96409 7.29C4.67182 5.16273 6.65591 3.57955 9 3.57955Z" fill="#EA4335"/>
      </svg>
      Google로 계속하기
    </button>

    <div class="loading" id="loadingMsg">로그인 중...</div>
</div>

<footer>
  <a href="terms.html">이용약관</a>
  <span>|</span>
  <a href="privacy.html">개인정보 처리방침</a>
  <span>|</span>
  <span style="font-family:'DM Mono',monospace;font-size:11px;color:var(--text-muted);letter-spacing:0.08em;">© 2026 ListenUp. All Rights Reserved.</span>
</footer>

<script>
  const SUPABASE_URL = 'https://wccuzwkswtaehcdijtcf.supabase.co';
  const SUPABASE_ANON_KEY = 'sb_publishable_eZS7VnthlclvotZvFA5C_w_ek_tSJ-y'; // ← 여기에 복사한 키 붙여넣기

  const { createClient } = supabase;
  const client = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  // 이미 로그인된 경우 메인으로 이동
  client.auth.getSession().then(({ data: { session } }) => {
    if (session) window.location.href = 'index.html';
  });

  // 로그인 후 콜백 처리
  client.auth.onAuthStateChange((event, session) => {
    if (event === 'SIGNED_IN' && session) {
      window.location.href = 'index.html';
    }
  });

  async function loginWithGoogle() {
    const errorEl = document.getElementById('errorMsg');
    const loadingEl = document.getElementById('loadingMsg');
    errorEl.classList.remove('show');
    loadingEl.classList.add('show');

    const { error } = await client.auth.signInWithOAuth({
      provider: 'google',
      options: {
        redirectTo: 'https://listenup-sage.vercel.app/index.html'
      }
    });

    if (error) {
      loadingEl.classList.remove('show');
      errorEl.textContent = '로그인 중 오류가 발생했어요: ' + error.message;
      errorEl.classList.add('show');
    }
  }
</script>
</body>
</html>
