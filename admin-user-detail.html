<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>유저 상세 - ListenUp!</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --bg: #0e0e0e; --surface: #1a1a1a; --surface2: #242424; --border: #2e2e2e;
    --accent: #c8f060; --accent2: #60c8f0; --text: #f0ede8; --text-muted: #6e6e6e;
    --danger: #f06060; --success: #60f0a0; --warn: #f0c060;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; display: flex; flex-direction: column; }
  body::before { content: ''; position: fixed; inset: 0; background: radial-gradient(ellipse 80% 50% at 20% 20%, rgba(200,240,96,0.04) 0%, transparent 60%), radial-gradient(ellipse 60% 40% at 80% 80%, rgba(96,200,240,0.04) 0%, transparent 60%); pointer-events: none; z-index: 0; }
  .container { max-width: 960px; margin: 0 auto; padding: 48px 24px 80px; position: relative; z-index: 1; flex: 1; }
  .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 32px; padding-bottom: 16px; border-bottom: 1px solid var(--border); }
  .logo { font-family: 'DM Mono', monospace; font-size: 15px; color: var(--accent2); text-decoration: none; letter-spacing: 0.18em; font-weight: 700; }
  .label { font-family: 'DM Mono', monospace; font-size: 11px; letter-spacing: 0.15em; color: var(--accent); text-transform: uppercase; margin-bottom: 10px; }
  .info-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 24px; }
  .info-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 16px 18px; }
  .info-label { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--text-muted); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 6px; }
  .info-value { font-size: 14px; color: var(--text); }
  .section-title { font-size: 14px; font-weight: 600; margin-bottom: 12px; margin-top: 28px; }
  .toefl-columns { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 28px; }
  .table-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
  table { width: 100%; border-collapse: collapse; }
  thead tr { background: var(--surface2); border-bottom: 1px solid var(--border); }
  th { padding: 10px 12px; text-align: left; font-family: 'DM Mono', monospace; font-size: 9px; color: var(--text-muted); font-weight: 400; letter-spacing: 0.08em; text-transform: uppercase; }
  tbody tr { border-bottom: 1px solid var(--border); }
  tbody tr:last-child { border-bottom: none; }
  td { padding: 12px; font-size: 12px; font-family: 'DM Mono', monospace; }
  .mode-badge { display: inline-block; font-family: 'DM Mono', monospace; font-size: 10px; padding: 3px 8px; border-radius: 6px; }
  .mode-shadowing { background: rgba(200,240,96,0.1); color: var(--accent); border: 1px solid rgba(200,240,96,0.2); }
  .mode-listening { background: rgba(96,200,240,0.1); color: var(--accent2); border: 1px solid rgba(96,200,240,0.2); }
  .mode-dictation { background: rgba(180,96,240,0.1); color: #c060f0; border: 1px solid rgba(180,96,240,0.2); }
  .mode-vocab { background: rgba(240,150,60,0.1); color: #f09640; border: 1px solid rgba(240,150,60,0.2); }
  .score-great { color: var(--success); }
  .score-ok { color: var(--warn); }
  .score-poor { color: var(--danger); }
  .empty { text-align: center; padding: 24px; color: var(--text-muted); font-size: 12px; }
  .loading { text-align: center; padding: 24px; color: var(--text-muted); font-family: 'DM Mono', monospace; font-size: 12px; }
  ::-webkit-scrollbar { width: 6px; } ::-webkit-scrollbar-track { background: transparent; } ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <a href="index.html" class="logo">🎧 ListenUp!</a>
    <a href="admin.html" style="font-family:'DM Mono',monospace;font-size:12px;color:var(--text-muted);text-decoration:none;">← 관리자</a>
  </div>

  <div class="label">Admin / 유저 상세</div>
  <h1 id="userName" style="font-size:28px;font-weight:600;margin-bottom:24px;">...</h1>

  <!-- 프로필 미설정 유저 입력 폼 -->
  <div id="createProfileForm" style="display:none;background:var(--surface);border:1px solid var(--accent);border-radius:12px;padding:20px;margin-bottom:24px;">
    <div style="font-family:'DM Mono',monospace;font-size:11px;color:var(--accent);letter-spacing:0.1em;text-transform:uppercase;margin-bottom:14px;">프로필 등록</div>
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:10px;align-items:end;">
      <div>
        <div style="font-size:11px;color:var(--text-muted);margin-bottom:4px;">이름</div>
        <input id="profileName" type="text" placeholder="홍길동" style="width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:6px;color:var(--text);padding:7px 8px;font-size:12px;">
      </div>
      <div>
        <div style="font-size:11px;color:var(--text-muted);margin-bottom:4px;">반</div>
        <select id="profileClass" style="width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:6px;color:var(--text);padding:7px 8px;font-size:12px;">
          <option value="">선택</option>
          <option value="완초1">완초1</option>
          <option value="완초2">완초2</option>
          <option value="인터">인터</option>
          <option value="케이">케이</option>
          <option value="주니어 U">주니어 U</option>
          <option value="주니어 S">주니어 S</option>
          <option value="주니어 H">주니어 H</option>
          <option value="주니어 E">주니어 E</option>
        </select>
      </div>
      <div>
        <div style="font-size:11px;color:var(--text-muted);margin-bottom:4px;">목표 점수</div>
        <input id="profileTarget" type="number" step="0.5" placeholder="-" style="width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:6px;color:var(--text);padding:7px 8px;font-size:12px;">
      </div>
      <div style="display:flex;align-items:flex-end;">
        <button onclick="createProfile()" style="width:100%;background:var(--accent);color:#0e0e0e;border:none;border-radius:6px;padding:8px;font-size:12px;font-weight:600;cursor:pointer;">저장</button>
      </div>
    </div>
  </div>

  <div class="info-grid" id="infoGrid">
    <div class="info-card">
      <div class="info-label">반</div>
      <div class="info-value" id="userClass">-</div>
    </div>
    <div class="info-card">
      <div class="info-label">목표 점수</div>
      <div class="info-value" id="userTarget">-</div>
    </div>
    <div class="info-card">
      <div class="info-label">목표 날짜</div>
      <div class="info-value" id="userTargetDate">-</div>
    </div>
  </div>

  <!-- 토플 -->
  <div class="section-title">토플 점수</div>

  <!-- 점수 추가 폼 -->
  <div id="addScoreForm" style="background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px;margin-bottom:20px;">
    <div style="font-family:'DM Mono',monospace;font-size:11px;color:var(--accent);letter-spacing:0.1em;text-transform:uppercase;margin-bottom:14px;">점수 추가</div>
    <div style="display:grid;grid-template-columns:repeat(4,1fr) 1fr 1fr 1fr 1fr;gap:10px;align-items:end;">
      <div>
        <div style="font-size:11px;color:var(--text-muted);margin-bottom:4px;">구분</div>
        <select id="addType" style="width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:6px;color:var(--text);padding:7px 8px;font-size:12px;">
          <option value="mock">모의</option>
          <option value="actual">실제</option>
        </select>
      </div>
      <div>
        <div style="font-size:11px;color:var(--text-muted);margin-bottom:4px;">날짜</div>
        <input id="addDate" type="date" style="width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:6px;color:var(--text);padding:7px 8px;font-size:12px;">
      </div>
      <div>
        <div style="font-size:11px;color:var(--text-muted);margin-bottom:4px;">R</div>
        <input id="addR" type="number" step="0.5" placeholder="-" style="width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:6px;color:var(--text);padding:7px 8px;font-size:12px;">
      </div>
      <div>
        <div style="font-size:11px;color:var(--text-muted);margin-bottom:4px;">L</div>
        <input id="addL" type="number" step="0.5" placeholder="-" style="width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:6px;color:var(--text);padding:7px 8px;font-size:12px;">
      </div>
      <div>
        <div style="font-size:11px;color:var(--text-muted);margin-bottom:4px;">S</div>
        <input id="addS" type="number" step="0.5" placeholder="-" style="width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:6px;color:var(--text);padding:7px 8px;font-size:12px;">
      </div>
      <div>
        <div style="font-size:11px;color:var(--text-muted);margin-bottom:4px;">W</div>
        <input id="addW" type="number" step="0.5" placeholder="-" style="width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:6px;color:var(--text);padding:7px 8px;font-size:12px;">
      </div>
      <div>
        <div style="font-size:11px;color:var(--text-muted);margin-bottom:4px;">총점</div>
        <input id="addTotal" type="number" step="0.5" placeholder="-" style="width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:6px;color:var(--text);padding:7px 8px;font-size:12px;">
      </div>
      <div style="display:flex;align-items:flex-end;">
        <button onclick="submitScore()" style="width:100%;background:var(--accent);color:#0e0e0e;border:none;border-radius:6px;padding:8px;font-size:12px;font-weight:600;cursor:pointer;">저장</button>
      </div>
    </div>
  </div>

  <div class="toefl-columns">
    <div>
      <div style="font-size:12px;color:var(--text-muted);margin-bottom:8px;font-family:'DM Mono',monospace;">모의 토플</div>
      <div class="table-wrap">
        <div class="loading" id="mockLoading">불러오는 중...</div>
        <table id="mockTable" style="display:none">
          <thead><tr>
            <th>날짜</th><th>R</th><th>L</th><th>S</th><th>W</th><th>평균</th><th>총점</th>
          </tr></thead>
          <tbody id="mockBody"></tbody>
        </table>
        <div class="empty" id="mockEmpty" style="display:none">기록 없음</div>
      </div>
    </div>
    <div>
      <div style="font-size:12px;color:var(--text-muted);margin-bottom:8px;font-family:'DM Mono',monospace;">실제 토플</div>
      <div class="table-wrap">
        <div class="loading" id="actualLoading">불러오는 중...</div>
        <table id="actualTable" style="display:none">
          <thead><tr>
            <th>날짜</th><th>R</th><th>L</th><th>S</th><th>W</th><th>평균</th><th>총점</th>
          </tr></thead>
          <tbody id="actualBody"></tbody>
        </table>
        <div class="empty" id="actualEmpty" style="display:none">기록 없음</div>
      </div>
    </div>
  </div>

  <!-- 트랙 기록 -->
  <div class="section-title">트랙 기록</div>
  <div class="table-wrap">
    <div class="loading" id="recordsLoading">불러오는 중...</div>
    <table id="recordsTable" style="display:none">
      <thead><tr>
        <th style="width:240px">트랙</th>
        <th style="width:100px">모드</th>
        <th style="width:80px">완료</th>
        <th style="width:70px">텍스트</th>
        <th style="width:60px">점수</th>
        <th style="width:130px">날짜</th>
      </tr></thead>
      <tbody id="recordsBody"></tbody>
    </table>
    <div class="empty" id="recordsEmpty" style="display:none">트랙 기록 없음</div>
  </div>
</div>

<script>
  const _supabase = supabase.createClient(
    'https://wccuzwkswtaehcdijtcf.supabase.co',
    'sb_publishable_eZS7VnthlclvotZvFA5C_w_ek_tSJ-y'
  );

  function formatDate(iso) {
    const d = new Date(iso);
    return `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
  }

  let currentUserId = null;

  async function createProfile() {
    const name = document.getElementById('profileName').value.trim();
    const cls = document.getElementById('profileClass').value;
    const target = document.getElementById('profileTarget').value;
    if (!name) { alert('이름을 입력해주세요'); return; }
    if (!cls) { alert('반을 선택해주세요'); return; }
    try {
      const res = await fetch('/api/admin-user-detail', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          user_id: currentUserId,
          type: 'create_profile',
          name,
          class: cls,
          target_score: target !== '' ? parseFloat(target) : null
        })
      });
      const data = await res.json();
      if (!data.success) throw new Error(data.error || '저장 실패');
      document.getElementById('createProfileForm').style.display = 'none';
      document.getElementById('infoGrid').style.display = 'grid';
      document.getElementById('userName').textContent = name;
      document.getElementById('userClass').textContent = cls;
      document.getElementById('userTarget').textContent = target ? target + '점' : '-';
    } catch(e) {
      alert('저장 실패: ' + e.message);
    }
  }

  async function submitScore() {
    const type = document.getElementById('addType').value;
    const date = document.getElementById('addDate').value;
    const r = document.getElementById('addR').value;
    const l = document.getElementById('addL').value;
    const s = document.getElementById('addS').value;
    const w = document.getElementById('addW').value;
    const total = document.getElementById('addTotal').value;

    if (!date) { alert('날짜를 입력해주세요'); return; }

    const body = {
      user_id: currentUserId,
      type,
      test_date: date,
      reading: r !== '' ? parseFloat(r) : null,
      listening: l !== '' ? parseFloat(l) : null,
      speaking: s !== '' ? parseFloat(s) : null,
      writing: w !== '' ? parseFloat(w) : null,
      total: total !== '' ? parseFloat(total) : null
    };

    try {
      const res = await fetch(`/api/admin-user-detail`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
      });
      const data = await res.json();
      if (!data.success) throw new Error(data.error || '저장 실패');

      // 입력 초기화
      document.getElementById('addDate').value = '';
      document.getElementById('addR').value = '';
      document.getElementById('addL').value = '';
      document.getElementById('addS').value = '';
      document.getElementById('addW').value = '';
      document.getElementById('addTotal').value = '';

      // 테이블 새로고침
      document.getElementById('mockBody').innerHTML = '';
      document.getElementById('actualBody').innerHTML = '';
      document.getElementById('mockTable').style.display = 'none';
      document.getElementById('actualTable').style.display = 'none';
      document.getElementById('mockEmpty').style.display = 'none';
      document.getElementById('actualEmpty').style.display = 'none';
      document.getElementById('mockLoading').style.display = 'block';
      document.getElementById('actualLoading').style.display = 'block';

      const detailRes = await fetch(`/api/admin-user-detail?id=${currentUserId}`);
      const detailData = await detailRes.json();
      renderToefl('mock', (detailData.toefl || []).filter(r => r.type === 'mock'));
      renderToefl('actual', (detailData.toefl || []).filter(r => r.type === 'actual'));
    } catch (e) {
      alert('저장 실패: ' + e.message);
    }
  }

  async function init() {
    const { data: { session } } = await _supabase.auth.getSession();
    if (!session) { window.location.href = 'login.html'; return; }
    const adminRes = await fetch('/api/check-admin', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email: session.user.email })
    });
    const adminData = await adminRes.json();
    if (!adminData.isAdmin) { window.location.href = 'index.html'; return; }
    if (adminData.role !== 'super') {
      document.getElementById('addScoreForm').style.display = 'none';
    }

    const params = new URLSearchParams(window.location.search);
    const userId = params.get('id');
    if (!userId) { window.location.href = 'admin-users.html'; return; }
    currentUserId = userId;

    const res = await fetch(`/api/admin-user-detail?id=${userId}`);
    const data = await res.json();
    if (data.error) { alert('불러오기 실패'); return; }

    // 프로필
    const p = data.profile;
    if (!p) {
      document.getElementById('userName').textContent = data.email || '프로필 미설정';
      document.getElementById('infoGrid').style.display = 'none';
      document.getElementById('createProfileForm').style.display = 'block';
    } else {
      document.getElementById('userName').textContent = p?.name || '이름 없음';
      document.getElementById('userClass').textContent = p?.class || '-';
      document.getElementById('userTarget').textContent = p?.target_score != null ? p.target_score + '점' : '-';
      document.getElementById('userTargetDate').textContent = p?.target_date || '-';
    }

    // 토플
    renderToefl('mock', (data.toefl || []).filter(r => r.type === 'mock'));
    renderToefl('actual', (data.toefl || []).filter(r => r.type === 'actual'));

    // 트랙 기록
    renderRecords(data.records || []);
  }

  function renderToefl(type, records) {
    document.getElementById(type + 'Loading').style.display = 'none';
    if (records.length === 0) { document.getElementById(type + 'Empty').style.display = 'block'; return; }
    const table = document.getElementById(type + 'Table');
    const body = document.getElementById(type + 'Body');
    table.style.display = 'table';
    records.forEach(r => {
      const vals = [r.reading, r.listening, r.speaking, r.writing].filter(v => v != null);
      const avg = vals.length ? (vals.reduce((a,b) => a+b,0)/vals.length).toFixed(2) : '-';
      const tr = document.createElement('tr');
      tr.style.borderBottom = '1px solid var(--border)';
      tr.innerHTML = `
        <td style="color:var(--text-muted)">${r.test_date}</td>
        <td>${r.reading ?? '-'}</td><td>${r.listening ?? '-'}</td><td>${r.speaking ?? '-'}</td><td>${r.writing ?? '-'}</td>
        <td style="color:var(--text-muted)">${avg}</td>
        <td style="color:var(--accent);font-weight:600">${r.total != null ? r.total : '-'}</td>
      `;
      body.appendChild(tr);
    });
  }

  function renderRecords(records) {
    document.getElementById('recordsLoading').style.display = 'none';
    if (records.length === 0) { document.getElementById('recordsEmpty').style.display = 'block'; return; }
    const table = document.getElementById('recordsTable');
    const body = document.getElementById('recordsBody');
    table.style.display = 'table';
    records.forEach(r => {
      const tr = document.createElement('tr');
      tr.style.borderBottom = '1px solid var(--border)';
      const scoreClass = r.score >= 80 ? 'score-great' : r.score >= 60 ? 'score-ok' : 'score-poor';
      const modeClass = r.mode === '쉐도잉' ? 'mode-shadowing' : r.mode === '청취테스트' ? 'mode-listening' : r.mode === '어휘테스트' ? 'mode-vocab' : 'mode-dictation';
      tr.innerHTML = `
        <td style="color:var(--text-muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${r.track}</td>
        <td><span class="mode-badge ${modeClass}">${r.mode}</span></td>
        <td style="color:var(--text-muted)">${r.progress || '-'}</td>
        <td style="color:var(--text-muted)">${r.textVisible === true ? '👁' : r.textVisible === false ? '🙈' : '-'}</td>
        <td class="${scoreClass}" style="font-weight:600">${r.score != null ? r.score + '점' : '-'}</td>
        <td style="color:var(--text-muted);font-size:11px">${formatDate(r.date)}</td>
      `;
      body.appendChild(tr);
    });
  }

  init();
</script>
</body>
</html>
